{% extends "base.html" %}

{% block main_wrapper_class %}container-fluid p-0{% endblock %}
{% block content_wrapper_class %}{% endblock %}

{% block content %}

<div id="iframe-container" class="d-flex flex-column">

    <!-- Toolbar -->
    <div class="d-flex justify-content-between align-items-center px-4 py-2 bg-white border-bottom shadow-sm">
        <div class="d-flex align-items-center gap-3">
            <span class="badge rounded-pill text-bg-primary px-3 py-2">Live</span>
            <h6 class="mb-0 fw-semibold text-dark">{{ dashboard.name }}</h6>
        </div>
        <a href="{% url 'dashboard_home' %}" class="btn btn-outline-secondary btn-sm rounded-pill px-3">
            ← Back to Dashboards
        </a>
    </div>

    <!-- IFRAME -->
    <iframe
        src="{{ dashboard.streamlit_url }}"
        class="w-100 flex-grow-1 border-0"
        allowfullscreen>
    </iframe>

</div>

<script>
    (function () {
        var navbar = document.querySelector('.navbar');
        var container = document.getElementById('iframe-container');
        function resize() {
            container.style.height = (window.innerHeight - navbar.offsetHeight) + 'px';
        }
        resize();
        window.addEventListener('resize', resize);
    })();

    window.addEventListener('message', function (e) {
        if (e.data && e.data.navigate) {
            window.location.href = e.data.navigate;
        }
    });
</script>

{% endblock %}
