{% extends "base.html" %}

{% block content %}
<div class="container py-5">
    <h3>Password Reset</h3>

    <form method="post">
        {% csrf_token %}
        {{ form.email.label_tag }}
        {{ form.email }}

        <button class="btn btn-primary mt-3">Send Reset Link</button>
    </form>
</div>
{% endblock %}
